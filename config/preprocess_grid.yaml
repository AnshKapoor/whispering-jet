base_config: config/backbone_full.yaml
# Repetition-check settings are inherited from the base config unless a variant overrides them.

variants:
  - preprocessed_id: 1
    preprocessing:
      resampling:
        n_points: 40
        method: "time"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 9
        polyorder: 2

  - preprocessed_id: 2
    preprocessing:
      resampling:
        n_points: 60
        method: "time"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 9
        polyorder: 2

  - preprocessed_id: 3
    preprocessing:
      resampling:
        n_points: 80
        method: "time"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 9
        polyorder: 2

  - preprocessed_id: 4
    preprocessing:
      resampling:
        n_points: 50
        method: "time"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 11
        polyorder: 3

  - preprocessed_id: 5
    preprocessing:
      resampling:
        n_points: 50
        method: "time"
      smoothing:
        enabled: false
        method: "none"

  - preprocessed_id: 6
    preprocessing:
      resampling:
        n_points: 50
        method: "time"
      smoothing:
        enabled: true
        method: "moving_average"
        window_length: 7

  - preprocessed_id: 7
    preprocessing:
      resampling:
        n_points: 50
        method: "time"
      smoothing:
        enabled: true
        method: "median"
        window_length: 7

  - preprocessed_id: 8
    preprocessing:
      resampling:
        n_points: 70
        method: "time"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 9
        polyorder: 2

  - preprocessed_id: 9
    preprocessing:
      resampling:
        n_points: 70
        method: "time"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 11
        polyorder: 3

  - preprocessed_id: 10
    preprocessing:
      resampling:
        n_points: 50
        method: "time"
      smoothing:
        enabled: true
        method: "ewm"
        window_length: 7

  - preprocessed_id: 11
    preprocessing:
      resampling:
        enabled: false
        method: "none"
      smoothing:
        enabled: false
        method: "none"

  - preprocessed_id: 12
    preprocessing:
      resampling:
        enabled: true
        n_points: 50
        method: "time"
      smoothing:
        enabled: false
        method: "none"
      filter:
        simplify:
          rdp_enabled: true
          rdp_epsilon_m: 50
          rdp_min_points: 10

  - preprocessed_id: 13
    preprocessing:
      resampling:
        enabled: false
        method: "none"
      smoothing:
        enabled: false
        method: "none"

  - preprocessed_id: 14
    preprocessing:
      resampling:
        n_points: 40
        method: "index"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 9
        polyorder: 2

  - preprocessed_id: 15
    preprocessing:
      resampling:
        n_points: 60
        method: "index"
      smoothing:
        enabled: true
        method: "savgol"
        window_length: 9
        polyorder: 2

  - preprocessed_id: 16
    preprocessing:
      resampling:
        n_points: 50
        method: "index"
      smoothing:
        enabled: true
        method: "moving_average"
        window_length: 7
