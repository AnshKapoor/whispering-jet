experiments:
  - name: "EXP132"
    experiment_name: "EXP132"
    method: "dbscan"
    distance_metric: "dtw"
    dbscan:
      eps: 145621.2772619243
      min_samples: 8
    distance_params:
      dense_precomputed: true
      dtw_window_size: 10
      use_lb_keogh: false
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 250
      random_state: 11
      mode: "sample_only"
    evaluation:
      include_noise: false
      precomputed_embed_for_dbch: true
      precomputed_embed_components: 3
    input:
      preprocessed_csv: "output/preprocessed/preprocessed_11.csv"

flows:
  flow_keys: ["A/D", "Runway"]
  include: []

input:
  preprocessed_csv: "output/preprocessed/preprocessed_11.csv"

output:
  dir: "output"
  skip_completed: false

features:
  vector_cols: ["x_utm", "y_utm"]
