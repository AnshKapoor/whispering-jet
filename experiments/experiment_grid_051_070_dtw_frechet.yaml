  # DBSCAN on Frechet distance scale (tuned from pairwise-distance audit)
  - name: "EXP084"
    experiment_name: "EXP084"
    method: "dbscan"
    distance_metric: "frechet"
    dbscan: { eps: 5000, min_samples: 8 }
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 300
      random_state: 11
      mode: "sample_only"
    distance_params:
      candidate_k: 999999
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

  # HDBSCAN on DTW scale
  - name: "EXP085"
    experiment_name: "EXP085"
    method: "hdbscan"
    distance_metric: "dtw"
    hdbscan: { min_cluster_size: 20, min_samples: 8 }
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 300
      random_state: 11
      mode: "sample_only"
    distance_params:
      candidate_k: 999999
      dtw_window_size: 8
      use_lb_keogh: false
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

