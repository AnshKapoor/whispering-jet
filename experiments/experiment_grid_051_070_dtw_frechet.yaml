experiments:
  # EXP051-EXP060: DTW-focused runs (5 dense exact + 5 sparse-edge)
  - name: "EXP051"
    experiment_name: "EXP051"
    method: "hdbscan"
    distance_metric: "dtw"
    hdbscan: { min_cluster_size: 20, min_samples: 10 }
    distance_params:
      candidate_k: 999999
      dtw_window_size: 8
      use_lb_keogh: false
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

  - name: "EXP052"
    experiment_name: "EXP052"
    method: "optics"
    distance_metric: "dtw"
    optics: { min_samples: 12, xi: 0.04, min_cluster_size: 0.04 }
    distance_params:
      candidate_k: 999999
      dtw_window_size: 8
      use_lb_keogh: false
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

