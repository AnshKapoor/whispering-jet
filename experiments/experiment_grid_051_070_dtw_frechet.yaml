    distance_metric: "frechet"
    hdbscan: { min_cluster_size: 20, min_samples: 8 }
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 300
      random_state: 11
      mode: "sample_only"
    distance_params:
      candidate_k: 999999
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

  # OPTICS on DTW scale
  - name: "EXP087"
    experiment_name: "EXP087"
    method: "optics"
    distance_metric: "dtw"
    optics: { min_samples: 8, xi: 0.04, min_cluster_size: 0.04 }
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 300
      random_state: 11
      mode: "sample_only"
    distance_params:
      candidate_k: 999999
      dtw_window_size: 8
      use_lb_keogh: false
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

  # OPTICS on Frechet scale
  - name: "EXP088"
    experiment_name: "EXP088"
    method: "optics"
    distance_metric: "frechet"
    optics: { min_samples: 8, xi: 0.04, min_cluster_size: 0.04 }
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 300
      random_state: 11
      mode: "sample_only"
    distance_params:
      candidate_k: 999999
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

flows:
  flow_keys: ["A/D", "Runway"]
  include: []

output:
  dir: "output"
  # EXP051-070 are repurposed in this file; keep false to force reruns when needed.
  skip_completed: false

features:
  vector_cols: ["x_utm", "y_utm"]
