experiments:
  # EXP138-EXP142: weighted-Euclidean HDBSCAN pilot
  # Uses the same operation-aware weighted-Euclidean distance as the
  # weighted DBSCAN block, but swaps the clustering method to HDBSCAN and
  # sweeps min_cluster_size to test whether a density hierarchy behaves
  # better than a fixed-radius cutoff on the same weighted geometry.
  - name: "EXP138"
    experiment_name: "EXP138"
    method: "hdbscan"
    distance_metric: "euclidean_weighted"
    hdbscan: { min_cluster_size: 12, min_samples: null }
    distance_params:
      weighted_n_dims: 2
      weighted_groups_by_operation:
        Landing:
          - { start_idx: 0, end_idx: 9, weight: 0.56 }
          - { start_idx: 10, end_idx: 19, weight: 0.77 }
          - { start_idx: 20, end_idx: 29, weight: 1.29 }
          - { start_idx: 30, end_idx: 39, weight: 1.38 }
        Departure:
          - { start_idx: 0, end_idx: 9, weight: 1.76 }
          - { start_idx: 10, end_idx: 19, weight: 1.03 }
          - { start_idx: 20, end_idx: 29, weight: 0.67 }
          - { start_idx: 30, end_idx: 39, weight: 0.54 }
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 500
      random_state: 11
      mode: "sample_only"
    evaluation:
      include_noise: false
      precomputed_embed_for_dbch: true
      precomputed_embed_components: 3
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

