experiments:
  # Dense-DTW pilot block on preprocessed_1 with 900 flights/flow sample.
  # DBSCAN eps values below assume eps_base ~= 58000 from prior DTW runs.
  # Recompute via scripts/probe_dtw_dbscan_eps.py if needed.

  # EXP089-EXP091: DTW + KMeans (via MDS embedding)
  - name: "EXP089"
    experiment_name: "EXP089"
    method: "kmeans"
    distance_metric: "dtw"
    kmeans: { n_clusters: 4, n_init: 20, random_state: 11 }
    distance_params:
      candidate_k: 999999
      dtw_window_size: 8
      use_lb_keogh: false
      mds_n_components: 3
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 900
      random_state: 11
      mode: "sample_only"
    evaluation:
      include_noise: false
      sparse_precomputed_policy: "dense_if_small"
      sparse_precomputed_max_n: 1500
      precomputed_embed_for_dbch: true
      precomputed_embed_components: 3
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }
    features: { vector_cols: ["x_utm", "y_utm"] }

