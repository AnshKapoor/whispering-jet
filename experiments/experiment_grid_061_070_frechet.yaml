      candidate_k: 40
      tau_quantile: 0.90
      rdp_epsilon: 50.0
    input: { preprocessed_csv: "output/preprocessed/preprocessed_2.csv" }

  - name: "EXP068"
    experiment_name: "EXP068"
    method: "optics"
    distance_metric: "frechet"
    optics: { min_samples: 12, xi: 0.04, min_cluster_size: 0.04 }
    distance_params:
      candidate_k: 30
      tau_quantile: 0.90
      rdp_epsilon: 50.0
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }

  - name: "EXP069"
    experiment_name: "EXP069"
    method: "hdbscan"
    distance_metric: "frechet"
    hdbscan: { min_cluster_size: 20, min_samples: 10 }
    distance_params:
      candidate_k: 30
      tau_quantile: 0.90
      rdp_epsilon: 50.0
    input: { preprocessed_csv: "output/preprocessed/preprocessed_11.csv" }

  - name: "EXP070"
    experiment_name: "EXP070"
    method: "hdbscan"
