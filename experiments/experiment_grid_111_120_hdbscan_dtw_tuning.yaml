experiments:
  # HDBSCAN tuning block on preprocessed_1 with 500 flights/flow sample.
  # Objective: reduce noise fraction while preserving operationally plausible cluster counts.
  # Common DTW settings: dense pairwise distances for robust HDBSCAN precomputed behavior.

  # EXP111-EXP115: EOM branch (coarser, lower fragmentation target)
  - name: "EXP111"
    experiment_name: "EXP111"
    method: "hdbscan"
    distance_metric: "dtw"
    hdbscan:
      min_cluster_size: 12
      min_samples: 5
      cluster_selection_method: "eom"
      allow_single_cluster: true
      cluster_selection_epsilon: 0.00
    distance_params:
      candidate_k: 999999
      dtw_window_size: 10
      use_lb_keogh: false
    sample_for_fit:
      enabled: true
      max_flights_per_flow: 500
      random_state: 11
      mode: "sample_only"
    evaluation:
      include_noise: false
      sparse_precomputed_policy: "dense_if_small"
      sparse_precomputed_max_n: 1500
      precomputed_embed_for_dbch: true
      precomputed_embed_components: 3
    input: { preprocessed_csv: "output/preprocessed/preprocessed_1.csv" }
    features: { vector_cols: ["x_utm", "y_utm"] }

  - name: "EXP112"
